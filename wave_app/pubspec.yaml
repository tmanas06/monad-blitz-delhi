name: wave_app
description: "wave. — Music download & player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12

  # Networking
  dio: ^5.4.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0

  # Utils
  permission_handler: ^11.3.0
  uuid: ^4.3.3

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.0

  # Blockchain & Wallet (Reown AppKit - Successor to WalletConnect V2)
  reown_appkit: ^1.1.2
  web3dart: ^2.7.3
  url_launcher: ^6.3.0
  http: ^1.2.0

  # Firebase & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
